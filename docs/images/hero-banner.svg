<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 340">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a"/>
      <stop offset="50%" style="stop-color:#1e1b4b"/>
      <stop offset="100%" style="stop-color:#0f172a"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#6366f1"/>
      <stop offset="50%" style="stop-color:#8b5cf6"/>
      <stop offset="100%" style="stop-color:#a78bfa"/>
    </linearGradient>
    <linearGradient id="green" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#10b981"/>
      <stop offset="100%" style="stop-color:#34d399"/>
    </linearGradient>
    <linearGradient id="amber" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#f59e0b"/>
      <stop offset="100%" style="stop-color:#fbbf24"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="340" fill="url(#bg)" rx="12"/>

  <!-- Subtle grid pattern -->
  <g opacity="0.05" stroke="#8b5cf6" stroke-width="0.5">
    <line x1="0" y1="40" x2="1200" y2="40"/>
    <line x1="0" y1="80" x2="1200" y2="80"/>
    <line x1="0" y1="120" x2="1200" y2="120"/>
    <line x1="0" y1="160" x2="1200" y2="160"/>
    <line x1="0" y1="200" x2="1200" y2="200"/>
    <line x1="0" y1="240" x2="1200" y2="240"/>
    <line x1="0" y1="280" x2="1200" y2="280"/>
    <line x1="0" y1="320" x2="1200" y2="320"/>
    <line x1="80" y1="0" x2="80" y2="340"/>
    <line x1="160" y1="0" x2="160" y2="340"/>
    <line x1="240" y1="0" x2="240" y2="340"/>
    <line x1="320" y1="0" x2="320" y2="340"/>
    <line x1="400" y1="0" x2="400" y2="340"/>
    <line x1="480" y1="0" x2="480" y2="340"/>
    <line x1="560" y1="0" x2="560" y2="340"/>
    <line x1="640" y1="0" x2="640" y2="340"/>
    <line x1="720" y1="0" x2="720" y2="340"/>
    <line x1="800" y1="0" x2="800" y2="340"/>
    <line x1="880" y1="0" x2="880" y2="340"/>
    <line x1="960" y1="0" x2="960" y2="340"/>
    <line x1="1040" y1="0" x2="1040" y2="340"/>
    <line x1="1120" y1="0" x2="1120" y2="340"/>
  </g>

  <!-- Decorative connection lines (left side) -->
  <g opacity="0.15" stroke="url(#accent)" stroke-width="1.5" fill="none">
    <path d="M 60,170 Q 120,120 180,170 Q 240,220 300,170"/>
    <circle cx="60" cy="170" r="4" fill="#6366f1"/>
    <circle cx="180" cy="170" r="4" fill="#8b5cf6"/>
    <circle cx="300" cy="170" r="4" fill="#a78bfa"/>
  </g>

  <!-- Decorative connection lines (right side) -->
  <g opacity="0.15" stroke="url(#green)" stroke-width="1.5" fill="none">
    <path d="M 900,170 Q 960,120 1020,170 Q 1080,220 1140,170"/>
    <circle cx="900" cy="170" r="4" fill="#10b981"/>
    <circle cx="1020" cy="170" r="4" fill="#34d399"/>
    <circle cx="1140" cy="170" r="4" fill="#6ee7b7"/>
  </g>

  <!-- Decorative dots -->
  <g opacity="0.1" fill="#8b5cf6">
    <circle cx="100" cy="60" r="2"/>
    <circle cx="140" cy="80" r="1.5"/>
    <circle cx="80" cy="100" r="1"/>
    <circle cx="1100" cy="60" r="2"/>
    <circle cx="1060" cy="80" r="1.5"/>
    <circle cx="1120" cy="100" r="1"/>
    <circle cx="100" cy="260" r="1.5"/>
    <circle cx="1100" cy="260" r="1.5"/>
  </g>

  <!-- Title -->
  <text x="600" y="100" text-anchor="middle" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="42" font-weight="700" fill="url(#accent)" filter="url(#glow)">Multi-Agent Framework</text>

  <!-- Subtitle -->
  <text x="600" y="145" text-anchor="middle" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="16" fill="#94a3b8" letter-spacing="0.5">Hybrid coordination for Claude Code, Gemini CLI, and Codex CLI</text>

  <!-- Divider line -->
  <line x1="400" y1="170" x2="800" y2="170" stroke="url(#accent)" stroke-width="1" opacity="0.3"/>

  <!-- Stats badges -->
  <g transform="translate(600, 210)" text-anchor="middle">
    <!-- Agents badge -->
    <g transform="translate(-280, 0)">
      <rect x="-55" y="-16" width="110" height="32" rx="16" fill="#6366f1" opacity="0.15" stroke="#6366f1" stroke-width="1" stroke-opacity="0.3"/>
      <text y="5" font-family="system-ui, sans-serif" font-size="13" font-weight="600" fill="#a5b4fc">18 Agents</text>
    </g>
    <!-- Skills badge -->
    <g transform="translate(-140, 0)">
      <rect x="-50" y="-16" width="100" height="32" rx="16" fill="#8b5cf6" opacity="0.15" stroke="#8b5cf6" stroke-width="1" stroke-opacity="0.3"/>
      <text y="5" font-family="system-ui, sans-serif" font-size="13" font-weight="600" fill="#c4b5fd">12 Skills</text>
    </g>
    <!-- Commands badge -->
    <g transform="translate(0, 0)">
      <rect x="-65" y="-16" width="130" height="32" rx="16" fill="#10b981" opacity="0.15" stroke="#10b981" stroke-width="1" stroke-opacity="0.3"/>
      <text y="5" font-family="system-ui, sans-serif" font-size="13" font-weight="600" fill="#6ee7b7">16 Commands</text>
    </g>
    <!-- Hooks badge -->
    <g transform="translate(140, 0)">
      <rect x="-48" y="-16" width="96" height="32" rx="16" fill="#f59e0b" opacity="0.15" stroke="#f59e0b" stroke-width="1" stroke-opacity="0.3"/>
      <text y="5" font-family="system-ui, sans-serif" font-size="13" font-weight="600" fill="#fcd34d">3 Hooks</text>
    </g>
    <!-- Modes badge -->
    <g transform="translate(280, 0)">
      <rect x="-48" y="-16" width="96" height="32" rx="16" fill="#ec4899" opacity="0.15" stroke="#ec4899" stroke-width="1" stroke-opacity="0.3"/>
      <text y="5" font-family="system-ui, sans-serif" font-size="13" font-weight="600" fill="#f9a8d4">4 Modes</text>
    </g>
  </g>

  <!-- Agent icons row -->
  <g transform="translate(600, 280)" text-anchor="middle" opacity="0.7">
    <!-- Claude icon -->
    <g transform="translate(-160, 0)">
      <rect x="-12" y="-12" width="24" height="24" rx="6" fill="#6366f1" opacity="0.3"/>
      <text y="4" font-family="system-ui, sans-serif" font-size="11" fill="#c7d2fe">C</text>
      <text y="28" font-family="system-ui, sans-serif" font-size="10" fill="#64748b">Claude</text>
    </g>
    <!-- Arrow -->
    <text x="-100" y="4" font-family="system-ui, sans-serif" font-size="14" fill="#475569">&#x2192;</text>
    <!-- Gemini icon -->
    <g transform="translate(-40, 0)">
      <rect x="-12" y="-12" width="24" height="24" rx="6" fill="#10b981" opacity="0.3"/>
      <text y="4" font-family="system-ui, sans-serif" font-size="11" fill="#a7f3d0">G</text>
      <text y="28" font-family="system-ui, sans-serif" font-size="10" fill="#64748b">Gemini</text>
    </g>
    <!-- Plus -->
    <text x="20" y="4" font-family="system-ui, sans-serif" font-size="14" fill="#475569">+</text>
    <!-- Codex icon -->
    <g transform="translate(80, 0)">
      <rect x="-12" y="-12" width="24" height="24" rx="6" fill="#f59e0b" opacity="0.3"/>
      <text y="4" font-family="system-ui, sans-serif" font-size="11" fill="#fde68a">X</text>
      <text y="28" font-family="system-ui, sans-serif" font-size="10" fill="#64748b">Codex</text>
    </g>
    <!-- Plus -->
    <text x="140" y="4" font-family="system-ui, sans-serif" font-size="14" fill="#475569">+</text>
    <!-- Subagents icon -->
    <g transform="translate(200, 0)">
      <rect x="-12" y="-12" width="24" height="24" rx="6" fill="#8b5cf6" opacity="0.3"/>
      <text y="4" font-family="system-ui, sans-serif" font-size="11" fill="#ddd6fe">S</text>
      <text y="28" font-family="system-ui, sans-serif" font-size="10" fill="#64748b">Subagents</text>
    </g>
  </g>
</svg>
