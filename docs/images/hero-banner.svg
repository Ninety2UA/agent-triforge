<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 340" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#13131f"/>
      <stop offset="100%" stop-color="#0c0c16"/>
    </linearGradient>
    <linearGradient id="molten" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ff6b2b"/>
      <stop offset="100%" stop-color="#ff8c42"/>
    </linearGradient>
    <radialGradient id="forgeGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ff6b2b" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#ff6b2b" stop-opacity="0"/>
    </radialGradient>
    <filter id="glow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="3" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Card background -->
  <rect width="1200" height="340" rx="14" fill="url(#bg)"/>
  <!-- Warm forge glow behind title -->
  <ellipse cx="150" cy="110" rx="300" ry="200" fill="url(#forgeGlow)"/>
  <!-- Subtle molten dot texture, far corners -->
  <g fill="#ff8c42" opacity="0.06">
    <circle cx="1140" cy="40" r="2"/><circle cx="1100" cy="40" r="2"/><circle cx="1060" cy="40" r="2"/><circle cx="1020" cy="40" r="2"/>
    <circle cx="1140" cy="76" r="2"/><circle cx="1100" cy="76" r="2"/><circle cx="1060" cy="76" r="2"/><circle cx="1020" cy="76" r="2"/>
    <circle cx="40" cy="300" r="2"/><circle cx="76" cy="300" r="2"/><circle cx="112" cy="300" r="2"/><circle cx="148" cy="300" r="2"/>
  </g>

  <!-- Accent bar -->
  <rect x="60" y="54" width="64" height="5" rx="2.5" fill="url(#molten)" filter="url(#glow)"/>

  <!-- Title -->
  <text x="60" y="110" font-size="46" font-weight="700" fill="#e8e8f0" letter-spacing="-1">Agent Triforge</text>

  <!-- Tagline -->
  <text x="60" y="146" font-size="20" font-weight="500" fill="#ff8c42">A six-CLI builder pool, orchestrated by Claude Code</text>

  <!-- Stat pills -->
  <g transform="translate(60, 178)" font-size="13">
    <g>
      <rect width="78" height="30" rx="15" fill="#1a1a2a" stroke="#ff8c42" stroke-opacity="0.4" stroke-width="1.5"/>
      <text x="39" y="20" text-anchor="middle"><tspan fill="#ffd700" font-weight="700">6</tspan><tspan fill="#a0a0b8"> CLIs</tspan></text>
    </g>
    <g transform="translate(90,0)">
      <rect width="100" height="30" rx="15" fill="#1a1a2a" stroke="#ff8c42" stroke-opacity="0.4" stroke-width="1.5"/>
      <text x="50" y="20" text-anchor="middle"><tspan fill="#ffd700" font-weight="700">19</tspan><tspan fill="#a0a0b8"> Agents</tspan></text>
    </g>
    <g transform="translate(202,0)">
      <rect width="94" height="30" rx="15" fill="#1a1a2a" stroke="#ff8c42" stroke-opacity="0.4" stroke-width="1.5"/>
      <text x="47" y="20" text-anchor="middle"><tspan fill="#ffd700" font-weight="700">13</tspan><tspan fill="#a0a0b8"> Skills</tspan></text>
    </g>
    <g transform="translate(308,0)">
      <rect width="122" height="30" rx="15" fill="#1a1a2a" stroke="#ff8c42" stroke-opacity="0.4" stroke-width="1.5"/>
      <text x="61" y="20" text-anchor="middle"><tspan fill="#ffd700" font-weight="700">19</tspan><tspan fill="#a0a0b8"> Commands</tspan></text>
    </g>
    <g transform="translate(442,0)">
      <rect width="86" height="30" rx="15" fill="#1a1a2a" stroke="#ff8c42" stroke-opacity="0.4" stroke-width="1.5"/>
      <text x="43" y="20" text-anchor="middle"><tspan fill="#ffd700" font-weight="700">4</tspan><tspan fill="#a0a0b8"> Hooks</tspan></text>
    </g>
  </g>

  <!-- Terminal card -->
  <g transform="translate(700, 45)">
    <!-- soft molten halo -->
    <rect x="-3" y="-3" width="456" height="256" rx="12" fill="none" stroke="#ff6b2b" stroke-opacity="0.18" stroke-width="2" filter="url(#glow)"/>
    <rect width="450" height="250" rx="10" fill="#0a0a12" stroke="#2a2a3e" stroke-width="1.5"/>
    <!-- title bar -->
    <rect width="450" height="34" rx="10" fill="#16161f"/>
    <rect y="22" width="450" height="12" fill="#16161f"/>
    <line x1="0" y1="34" x2="450" y2="34" stroke="#2a2a3e" stroke-width="1"/>
    <circle cx="20" cy="17" r="6" fill="#ff5f57"/>
    <circle cx="42" cy="17" r="6" fill="#febc2e"/>
    <circle cx="64" cy="17" r="6" fill="#28c840"/>
    <text x="225" y="22" font-family="'SF Mono','JetBrains Mono',monospace" font-size="12" fill="#6a6a82" text-anchor="middle">claude</text>

    <!-- content -->
    <g font-family="'SF Mono','JetBrains Mono',monospace" font-size="13.5">
      <text x="18" y="66"><tspan fill="#6a6a82">$</tspan><tspan fill="#ff8c42"> claude</tspan></text>
      <text x="18" y="91"><tspan fill="#ffd700">&gt;</tspan><tspan fill="#e8e8f0"> /ship add auth module</tspan></text>
      <text x="18" y="116" fill="#a0a0b8">  Roster resolved: <tspan fill="#ffd700">6</tspan> CLIs</text>
      <text x="18" y="141" fill="#a0a0b8">  Wave: <tspan fill="#4a9eff">3</tspan> builders leased (worktrees)</text>
      <text x="18" y="166" fill="#a0a0b8">  Cross-review &#8594; integration branch</text>
      <text x="18" y="191" fill="#3fb950">  &#x2713; Promoted to main. Shipped.</text>
      <text x="18" y="220"><tspan fill="#ffd700">&gt;</tspan></text>
    </g>
    <!-- blinking cursor -->
    <rect x="34" y="209" width="9" height="15" fill="#ff8c42">
      <animate attributeName="opacity" values="1;0;1" dur="1.2s" repeatCount="indefinite"/>
    </rect>
  </g>
</svg>
