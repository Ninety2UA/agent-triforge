<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 620" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#13131f"/>
      <stop offset="100%" stop-color="#0c0c16"/>
    </linearGradient>
    <filter id="glow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="3" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <marker id="ahMolten" markerWidth="13" markerHeight="13" refX="10" refY="4.5" orient="auto" markerUnits="userSpaceOnUse"><path d="M0,0 L11,4.5 L0,9 Z" fill="#ff8c42"/></marker>
    <marker id="ahGold" markerWidth="13" markerHeight="13" refX="10" refY="4.5" orient="auto" markerUnits="userSpaceOnUse"><path d="M0,0 L11,4.5 L0,9 Z" fill="#ffd700"/></marker>
    <marker id="ahGreen" markerWidth="13" markerHeight="13" refX="10" refY="4.5" orient="auto" markerUnits="userSpaceOnUse"><path d="M0,0 L11,4.5 L0,9 Z" fill="#3fb950"/></marker>
    <marker id="ahSteel" markerWidth="13" markerHeight="13" refX="10" refY="4.5" orient="auto" markerUnits="userSpaceOnUse"><path d="M0,0 L11,4.5 L0,9 Z" fill="#4a9eff"/></marker>
    <marker id="ahPurple" markerWidth="13" markerHeight="13" refX="10" refY="4.5" orient="auto" markerUnits="userSpaceOnUse"><path d="M0,0 L11,4.5 L0,9 Z" fill="#a371f7"/></marker>
  </defs>

  <rect width="1200" height="620" rx="14" fill="url(#bg)"/>

  <!-- Title -->
  <text x="60" y="42" font-size="24" font-weight="700" fill="#e8e8f0">The Builder-Pool Wave</text>
  <text x="60" y="65" font-size="13" fill="#a0a0b8">One lead, many builders &#8212; isolated worktrees, cross-reviewed, promoted as one commit per task.</text>

  <!-- A: roster.toml -->
  <rect x="450" y="74" width="300" height="48" rx="11" fill="#1a1a2a" stroke="#2a2a3e" stroke-width="1.5"/>
  <text x="600" y="96" text-anchor="middle" font-family="'SF Mono','JetBrains Mono',monospace" font-size="15" font-weight="600" fill="#ff8c42">ops/roster.toml</text>
  <text x="600" y="114" text-anchor="middle" font-size="11.5" fill="#6a6a82">roles &#8594; CLI &#183; model &#183; effort</text>
  <line x1="600" y1="122" x2="600" y2="148" stroke="#ff8c42" stroke-width="2" marker-end="url(#ahMolten)"/>

  <!-- B: Claude lead -->
  <rect x="440" y="150" width="320" height="62" rx="12" fill="#1a1a2a" stroke="#ff8c42" stroke-width="1.5"/>
  <rect x="440" y="150" width="320" height="62" rx="12" fill="none" stroke="#ff8c42" stroke-width="1.5" opacity="0.45" filter="url(#glow)"/>
  <text x="600" y="179" text-anchor="middle" font-size="16" font-weight="700" fill="#ff8c42">Claude Code &#8212; lead</text>
  <text x="600" y="200" text-anchor="middle" font-size="12" fill="#a0a0b8">Wave assignment from TASKS.md</text>

  <!-- Fan-out bus -->
  <line x1="600" y1="212" x2="600" y2="236" stroke="#ff8c42" stroke-width="2"/>
  <line x1="210" y1="236" x2="990" y2="236" stroke="#ff8c42" stroke-width="2"/>
  <line x1="210" y1="236" x2="210" y2="260" stroke="#3fb950" stroke-width="2" marker-end="url(#ahGreen)"/>
  <line x1="600" y1="236" x2="600" y2="260" stroke="#4a9eff" stroke-width="2" marker-end="url(#ahSteel)"/>
  <line x1="990" y1="236" x2="990" y2="260" stroke="#a371f7" stroke-width="2" marker-end="url(#ahPurple)"/>

  <!-- C: lease cards -->
  <!-- col1 Codex (green) -->
  <rect x="75" y="262" width="270" height="110" rx="12" fill="#1a1a2a" stroke="#3fb950" stroke-width="1.5"/>
  <rect x="75" y="262" width="270" height="110" rx="12" fill="none" stroke="#3fb950" stroke-width="1.5" opacity="0.4" filter="url(#glow)"/>
  <text x="210" y="290" text-anchor="middle" font-size="11.5" fill="#6a6a82">per-task lease</text>
  <text x="210" y="320" text-anchor="middle" font-size="18" font-weight="700" fill="#3fb950">Codex builder</text>
  <text x="210" y="344" text-anchor="middle" font-size="12" fill="#c8c8d8">isolated git worktree</text>
  <text x="210" y="362" text-anchor="middle" font-size="10" fill="#6a6a82">env allowlist &#183; provider-only egress</text>
  <!-- col2 Antigravity (steel) -->
  <rect x="465" y="262" width="270" height="110" rx="12" fill="#1a1a2a" stroke="#4a9eff" stroke-width="1.5"/>
  <rect x="465" y="262" width="270" height="110" rx="12" fill="none" stroke="#4a9eff" stroke-width="1.5" opacity="0.4" filter="url(#glow)"/>
  <text x="600" y="290" text-anchor="middle" font-size="11.5" fill="#6a6a82">per-task lease</text>
  <text x="600" y="320" text-anchor="middle" font-size="18" font-weight="700" fill="#4a9eff">Antigravity builder</text>
  <text x="600" y="344" text-anchor="middle" font-size="12" fill="#c8c8d8">isolated git worktree</text>
  <text x="600" y="362" text-anchor="middle" font-size="10" fill="#6a6a82">env allowlist &#183; provider-only egress</text>
  <!-- col3 OpenCode (purple) -->
  <rect x="855" y="262" width="270" height="110" rx="12" fill="#1a1a2a" stroke="#a371f7" stroke-width="1.5"/>
  <rect x="855" y="262" width="270" height="110" rx="12" fill="none" stroke="#a371f7" stroke-width="1.5" opacity="0.4" filter="url(#glow)"/>
  <text x="990" y="290" text-anchor="middle" font-size="11.5" fill="#6a6a82">per-task lease</text>
  <text x="990" y="320" text-anchor="middle" font-size="18" font-weight="700" fill="#a371f7">OpenCode builder</text>
  <text x="990" y="344" text-anchor="middle" font-size="12" fill="#c8c8d8">isolated git worktree</text>
  <text x="990" y="362" text-anchor="middle" font-size="10" fill="#6a6a82">env allowlist &#183; provider-only egress</text>

  <!-- C -> D connectors -->
  <line x1="210" y1="372" x2="210" y2="404" stroke="#3fb950" stroke-width="2" marker-end="url(#ahGreen)"/>
  <line x1="600" y1="372" x2="600" y2="404" stroke="#4a9eff" stroke-width="2" marker-end="url(#ahSteel)"/>
  <line x1="990" y1="372" x2="990" y2="404" stroke="#a371f7" stroke-width="2" marker-end="url(#ahPurple)"/>

  <!-- D: cross-review -->
  <g>
    <rect x="75" y="406" width="270" height="44" rx="11" fill="#1a1a2a" stroke="#ffd700" stroke-width="1.5"/>
    <text x="210" y="425" text-anchor="middle" font-size="13.5" font-weight="700" fill="#ffd700">Cross-review</text>
    <text x="210" y="441" text-anchor="middle" font-size="10.5" fill="#6a6a82">pinned non-author &#183; no self-merge</text>
  </g>
  <g>
    <rect x="465" y="406" width="270" height="44" rx="11" fill="#1a1a2a" stroke="#ffd700" stroke-width="1.5"/>
    <text x="600" y="425" text-anchor="middle" font-size="13.5" font-weight="700" fill="#ffd700">Cross-review</text>
    <text x="600" y="441" text-anchor="middle" font-size="10.5" fill="#6a6a82">pinned non-author &#183; no self-merge</text>
  </g>
  <g>
    <rect x="855" y="406" width="270" height="44" rx="11" fill="#1a1a2a" stroke="#ffd700" stroke-width="1.5"/>
    <text x="990" y="425" text-anchor="middle" font-size="13.5" font-weight="700" fill="#ffd700">Cross-review</text>
    <text x="990" y="441" text-anchor="middle" font-size="10.5" fill="#6a6a82">pinned non-author &#183; no self-merge</text>
  </g>

  <!-- converge bus -->
  <line x1="210" y1="450" x2="210" y2="470" stroke="#ffd700" stroke-width="2"/>
  <line x1="990" y1="450" x2="990" y2="470" stroke="#ffd700" stroke-width="2"/>
  <line x1="600" y1="450" x2="600" y2="470" stroke="#ffd700" stroke-width="2"/>
  <line x1="210" y1="470" x2="990" y2="470" stroke="#ffd700" stroke-width="2"/>
  <line x1="600" y1="470" x2="600" y2="486" stroke="#ffd700" stroke-width="2" marker-end="url(#ahGold)"/>

  <!-- E: integration branch -->
  <rect x="390" y="486" width="420" height="44" rx="11" fill="#1a1a2a" stroke="#ff8c42" stroke-width="1.5"/>
  <rect x="390" y="486" width="420" height="44" rx="11" fill="none" stroke="#ff8c42" stroke-width="1.5" opacity="0.4" filter="url(#glow)"/>
  <text x="600" y="506" text-anchor="middle" font-size="14.5" font-weight="700" fill="#ff8c42">Sprint integration branch</text>
  <text x="600" y="522" text-anchor="middle" font-size="10.5" fill="#a0a0b8">one squash commit per task &#183; integration-verifier gate</text>

  <!-- E -> F elbow -->
  <path d="M600,530 L600,538 L468,538 L468,546" fill="none" stroke="#ffd700" stroke-width="2" marker-end="url(#ahGold)"/>

  <!-- F: promote gate + main -->
  <rect x="330" y="546" width="276" height="44" rx="11" fill="#1a1a2a" stroke="#ffd700" stroke-width="1.5"/>
  <text x="468" y="566" text-anchor="middle" font-size="13.5" font-weight="700" fill="#ffd700">lease_promote gate</text>
  <text x="468" y="582" text-anchor="middle" font-size="10.5" fill="#6a6a82">protected-path + approval</text>

  <text x="683" y="562" text-anchor="middle" font-size="10.5" fill="#6a6a82">promote</text>
  <line x1="606" y1="568" x2="759" y2="568" stroke="#3fb950" stroke-width="2" marker-end="url(#ahGreen)"/>

  <rect x="761" y="546" width="150" height="44" rx="11" fill="#152418" stroke="#3fb950" stroke-width="1.5"/>
  <rect x="761" y="546" width="150" height="44" rx="11" fill="none" stroke="#3fb950" stroke-width="1.5" opacity="0.5" filter="url(#glow)"/>
  <text x="836" y="565" text-anchor="middle" font-size="16" font-weight="700" fill="#3fb950">main</text>
  <text x="836" y="581" text-anchor="middle" font-size="10" fill="#3fb950" opacity="0.8">&#x2713; promoted</text>
</svg>
