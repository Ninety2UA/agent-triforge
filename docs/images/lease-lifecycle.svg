<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 480" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#13131f"/>
      <stop offset="100%" stop-color="#0c0c16"/>
    </linearGradient>
    <filter id="glow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="3" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <marker id="ahN" markerWidth="12" markerHeight="12" refX="9.5" refY="4" orient="auto" markerUnits="userSpaceOnUse"><path d="M0,0 L10,4 L0,8 Z" fill="#8a8a9e"/></marker>
    <marker id="ahGreen" markerWidth="12" markerHeight="12" refX="9.5" refY="4" orient="auto" markerUnits="userSpaceOnUse"><path d="M0,0 L10,4 L0,8 Z" fill="#3fb950"/></marker>
    <marker id="ahEmber" markerWidth="12" markerHeight="12" refX="9.5" refY="4" orient="auto" markerUnits="userSpaceOnUse"><path d="M0,0 L10,4 L0,8 Z" fill="#e84545"/></marker>
    <marker id="ahAmber" markerWidth="12" markerHeight="12" refX="9.5" refY="4" orient="auto" markerUnits="userSpaceOnUse"><path d="M0,0 L10,4 L0,8 Z" fill="#f0a020"/></marker>
    <marker id="ahGold" markerWidth="12" markerHeight="12" refX="9.5" refY="4" orient="auto" markerUnits="userSpaceOnUse"><path d="M0,0 L10,4 L0,8 Z" fill="#ffd700"/></marker>
  </defs>

  <rect width="1200" height="480" rx="14" fill="url(#bg)"/>

  <!-- Title -->
  <text x="60" y="36" font-size="24" font-weight="700" fill="#e8e8f0">Lease Lifecycle</text>
  <text x="60" y="56" font-size="13" fill="#a0a0b8">Every per-task lease moves through the ledger as one of eight states.</text>

  <!-- ===== transitions (drawn under nodes) ===== -->
  <!-- happy path -->
  <line x1="72" y1="132" x2="107" y2="132" stroke="#8a8a9e" stroke-width="2" marker-end="url(#ahN)"/>
  <line x1="240" y1="132" x2="347" y2="132" stroke="#8a8a9e" stroke-width="2" marker-end="url(#ahN)"/>
  <line x1="480" y1="132" x2="592" y2="132" stroke="#8a8a9e" stroke-width="2" marker-end="url(#ahN)"/>
  <line x1="725" y1="132" x2="837" y2="132" stroke="#3fb950" stroke-width="2" marker-end="url(#ahGreen)"/>
  <text x="293" y="121" text-anchor="middle" font-size="10" fill="#8a8a9e">worktree + dispatch</text>
  <text x="536" y="121" text-anchor="middle" font-size="10" fill="#8a8a9e">exit 0 &#183; collected</text>
  <text x="782" y="121" text-anchor="middle" font-size="10" fill="#7fce8f">approved &#183; 1 commit</text>

  <!-- findings loop (Review -> Building) -->
  <path d="M612,106 C580,78 484,78 452,106" fill="none" stroke="#ffd700" stroke-width="2" marker-end="url(#ahGold)"/>
  <text x="532" y="70" text-anchor="middle" font-size="10" fill="#ffd700">findings &#183; cycle &lt;3 &#183; same reviewer</text>

  <!-- Building -> Orphaned -->
  <line x1="415" y1="158" x2="415" y2="242" stroke="#f0a020" stroke-width="2" marker-end="url(#ahAmber)"/>
  <text x="424" y="204" font-size="10" fill="#f0a020">heartbeat expired</text>
  <!-- Building -> Failed -->
  <line x1="470" y1="158" x2="580" y2="242" stroke="#e84545" stroke-width="2" marker-end="url(#ahEmber)"/>
  <text x="548" y="188" font-size="10" fill="#e84545">auth / absent CLI</text>
  <!-- Orphaned -> Requeued -->
  <line x1="348" y1="270" x2="243" y2="270" stroke="#f0a020" stroke-width="2" marker-end="url(#ahAmber)"/>
  <text x="295" y="261" text-anchor="middle" font-size="10" fill="#f0a020">worktree pruned</text>
  <!-- Requeued -> Leased (up) -->
  <line x1="175" y1="242" x2="175" y2="161" stroke="#f0a020" stroke-width="2" marker-end="url(#ahAmber)"/>
  <text x="185" y="205" font-size="10" fill="#f0a020">once, diff. builder</text>
  <!-- Requeued -> Escalated -->
  <line x1="178" y1="296" x2="682" y2="405" stroke="#e84545" stroke-width="2" marker-end="url(#ahEmber)"/>
  <text x="405" y="356" text-anchor="middle" font-size="10" fill="#e84545">2nd failure</text>
  <!-- Failed -> Escalated -->
  <line x1="600" y1="296" x2="740" y2="381" stroke="#e84545" stroke-width="2" marker-end="url(#ahEmber)"/>
  <text x="694" y="342" text-anchor="middle" font-size="10" fill="#e84545">fail fast</text>
  <!-- Review -> Escalated -->
  <line x1="660" y1="158" x2="793" y2="381" stroke="#e84545" stroke-width="2" marker-end="url(#ahEmber)"/>
  <text x="752" y="250" font-size="10" fill="#e84545">cycle 3 &#183; no reviewer</text>

  <!-- ===== states ===== -->
  <!-- start -->
  <circle cx="64" cy="132" r="7" fill="#a0a0b8"/>

  <!-- Leased -->
  <rect x="110" y="106" width="130" height="52" rx="11" fill="#1a1a2a" stroke="#4a9eff" stroke-width="1.6"/>
  <text x="175" y="137" text-anchor="middle" font-size="15" font-weight="700" fill="#4a9eff">Leased</text>
  <!-- Building -->
  <rect x="350" y="106" width="130" height="52" rx="11" fill="#1a1a2a" stroke="#ff6b2b" stroke-width="1.6"/>
  <rect x="350" y="106" width="130" height="52" rx="11" fill="none" stroke="#ff6b2b" stroke-width="1.6" opacity="0.5" filter="url(#glow)"/>
  <text x="415" y="137" text-anchor="middle" font-size="15" font-weight="700" fill="#ff8c42">Building</text>
  <!-- Review -->
  <rect x="595" y="106" width="130" height="52" rx="11" fill="#1a1a2a" stroke="#ffd700" stroke-width="1.6"/>
  <text x="660" y="137" text-anchor="middle" font-size="15" font-weight="700" fill="#ffd700">Review</text>
  <!-- Merged -->
  <rect x="840" y="106" width="130" height="52" rx="11" fill="#14231a" stroke="#3fb950" stroke-width="1.6"/>
  <rect x="840" y="106" width="130" height="52" rx="11" fill="none" stroke="#3fb950" stroke-width="1.6" opacity="0.5" filter="url(#glow)"/>
  <text x="905" y="137" text-anchor="middle" font-size="15" font-weight="700" fill="#3fb950">Merged</text>

  <!-- Requeued -->
  <rect x="110" y="244" width="130" height="52" rx="11" fill="#1a1a2a" stroke="#4a9eff" stroke-width="1.6"/>
  <text x="175" y="275" text-anchor="middle" font-size="15" font-weight="700" fill="#4a9eff">Requeued</text>
  <!-- Orphaned -->
  <rect x="350" y="244" width="130" height="52" rx="11" fill="#1a1a2a" stroke="#f0a020" stroke-width="1.6"/>
  <text x="415" y="275" text-anchor="middle" font-size="15" font-weight="700" fill="#f0a020">Orphaned</text>
  <!-- Failed -->
  <rect x="535" y="244" width="130" height="52" rx="11" fill="#241618" stroke="#e84545" stroke-width="1.6"/>
  <text x="600" y="275" text-anchor="middle" font-size="15" font-weight="700" fill="#e84545">Failed</text>

  <!-- Escalated -->
  <rect x="685" y="384" width="150" height="52" rx="11" fill="#241618" stroke="#e84545" stroke-width="1.6"/>
  <rect x="685" y="384" width="150" height="52" rx="11" fill="none" stroke="#e84545" stroke-width="1.6" opacity="0.45" filter="url(#glow)"/>
  <text x="760" y="415" text-anchor="middle" font-size="15" font-weight="700" fill="#e84545">Escalated</text>

  <!-- ===== ledger legend ===== -->
  <rect x="40" y="360" width="300" height="100" rx="11" fill="#161620" stroke="#2a2a3e" stroke-width="1.5"/>
  <text x="58" y="384" font-family="'SF Mono','JetBrains Mono',monospace" font-size="13.5" font-weight="600" fill="#ff8c42">ops/leases.toml</text>
  <text x="58" y="402" font-size="11" fill="#a0a0b8">lead-owned &#183; single-writer ledger</text>
  <circle cx="63" cy="422" r="5" fill="#3fb950"/><text x="74" y="426" font-size="10.5" fill="#a0a0b8">merged</text>
  <circle cx="150" cy="422" r="5" fill="#e84545"/><text x="161" y="426" font-size="10.5" fill="#a0a0b8">failed / escalated</text>
  <circle cx="63" cy="444" r="5" fill="#4a9eff"/><text x="74" y="448" font-size="10.5" fill="#a0a0b8">active: leased &#183; building &#183; review</text>
</svg>
